<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>❤️ Спасибо, что сказала «Да»! ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
            background: #000;
        }
        /* Видео на весь экран */
        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* Анимированные сердечки поверх видео */
        .heart {
            position: fixed;
            font-size: 1.5rem;
            color: red;
            user-select: none;
            pointer-events: none;
            z-index: 2;
            animation: floatUp 4s ease-out forwards;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) scale(1.2);
                opacity: 0;
            }
        }
        /* Кнопка фото */
        .photo-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 3;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        .photo-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        /* Текст поверх видео */
        .message {
            position: fixed;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 3;
            color: white;
            font-size: 2rem;
            text-shadow: 0 0 10px red;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <div class="message">❤️ Ты сказала «ДА»! ❤️</div>
    <button class="photo-btn" id="takePhotoBtn">📸 Сделать фото</button>

    <script>
        // --- 1. Запускаем камеру на весь экран ---
        const video = document.getElementById('video');
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Ошибка камеры:", err);
                document.body.innerHTML += "<p style='color:white; text-align:center; padding-top:50vh;'>Не удалось запустить камеру</p>";
            }
        }
        startCamera();

        // --- 2. Бесконечные летающие сердечки ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️', '💖', '💗', '💘', '💝'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }
        setInterval(createHeart, 200);

        // --- 3. Кнопка "Сделать фото" ---
        document.getElementById('takePhotoBtn').addEventListener('click', async () => {
            if (!video.srcObject) return;
            const track = video.srcObject.getVideoTracks()[0];
            const imageCapture = new ImageCapture(track);
            try {
                const blob = await imageCapture.takePhoto();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'proposal_ moment.png';
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                alert("Не удалось сделать фото :(");
            }
        });
    </script>
</body>
</html>
